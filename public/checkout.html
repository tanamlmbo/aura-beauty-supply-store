<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Beauty Supply — Checkout</title>
    <link rel="icon" type="image/png" href="/my_favicon.png">
    <style>
        body { background-color: #FFF0F5; font-family: 'Playfair Display', Georgia, serif; margin: 0; padding: 0; color: #4A4A4A; }
        .header-banner { background-color: #FFC0CB; padding: 25px 40px; text-align: center; border-bottom: 1px solid #FFB6C1; }
        .header-banner h1 { margin: 0; letter-spacing: 4px; font-size: 28px; color: #333; }
        .nav-links { margin-top: 10px; font-family: sans-serif; font-size: 13px; }
        .nav-links a { color: #DB7093; text-decoration: none; margin: 0 15px; letter-spacing: 1px; }
        .checkout-container { max-width: 600px; background: #FFFFFF; margin: 50px auto; padding: 40px; border-radius: 12px; box-shadow: 0 8px 25px rgba(255, 182, 193, 0.3); border: 1px solid #FFB6C1; }
        h2 { color: #FF69B4; font-size: 22px; letter-spacing: 1px; border-bottom: 2px solid #FFE4E1; padding-bottom: 10px; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 20px; font-family: sans-serif; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #7F7F7F; letter-spacing: 1px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #FFE4E1; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #FFF9FA; transition: border 0.3s; }
        input:focus { border-color: #FF69B4; outline: none; }
        .submit-btn { background-color: #FF69B4; color: white; letter-spacing: 2px; padding: 16px; width: 100%; border: none; border-radius: 8px; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.1s; margin-top: 10px; }
        .submit-btn:hover { background-color: #FF1493; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>AURA BEAUTY SUPPLY</h1>
        <div class="nav-links">
            <a href="/">HOME</a>
            <a href="/products?category=lips">COLLECTIONS</a>
            <a href="/wishlist">MY WISHLIST</a>
        </div>
    </div>

    <div class="checkout-container">
        <h2>CONCIERGE CHECKOUT</h2>
        
        <form action="/orders" method="POST" autocomplete="off">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="address">Delivery Address</label>
                <input type="text" id="address" name="address" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="card">Card Details</label>
                <input type="text" id="card" name="card" type="password" required autocomplete="off">
            </div>
            <button type="submit" class="submit-btn">COMMIT LUXURY ORDER</button>
        </form>
    </div>

</body>
</html>
