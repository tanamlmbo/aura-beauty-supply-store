<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Beauty Supply — My Luxury Wishlist</title>
    <link rel="icon" type="image/png" href="/my_favicon.png">
    <style>
        body { background-color: #FFF0F5; font-family: 'Playfair Display', Georgia, serif; margin: 0; padding: 0; color: #4A4A4A; }
        .header-banner { background-color: #FFC0CB; padding: 25px 40px; text-align: center; border-bottom: 1px solid #FFB6C1; }
        .header-banner h1 { margin: 0; letter-spacing: 4px; font-size: 28px; color: #333; }
        .nav-links { margin-top: 10px; font-family: sans-serif; font-size: 13px; }
        .nav-links a { color: #DB7093; text-decoration: none; margin: 0 15px; letter-spacing: 1px; }
        .wishlist-container { max-width: 800px; margin: 60px auto; padding: 20px; text-align: center; }
        h2 { color: #FF69B4; font-size: 26px; letter-spacing: 2px; }
        .empty-state { background: #FFFFFF; padding: 50px 30px; border-radius: 12px; border: 1px dashed #FFB6C1; box-shadow: 0 4px 15px rgba(255,182,193,0.2); }
        .sparkle-icon { font-size: 40px; margin-bottom: 15px; color: #FF69B4; }
        .browse-btn { display: inline-block; background-color: #FF69B4; color: white; text-decoration: none; padding: 14px 30px; border-radius: 8px; font-family: sans-serif; font-size: 13px; font-weight: bold; letter-spacing: 1px; margin-top: 20px; transition: background 0.3s; }
        .browse-btn:hover { background-color: #FF1493; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>AURA BEAUTY SUPPLY</h1>
        <div class="nav-links">
            <a href="/">HOME</a>
            <a href="/products?category=lips">COLLECTIONS</a>
            <a href="/checkout">CHECKOUT</a>
        </div>
    </div>

    <div class="wishlist-container">
        <div class="empty-state">
            <div class="sparkle-icon">✨💖✨</div>
            <h2>THE WISHLIST ROTATION</h2>
            <p style="font-family: sans-serif; font-size: 14px; color: #8B7878; line-height: 1.6; max-width: 450px; margin: 0 auto;">
                Your curated dream items live here. Items you add to your wish cache are tracked dynamically for your next alignment routine.
            </p>
            <a href="/products?category=lips" class="browse-btn">EXPLORE COLLECTIONS</a>
        </div>
    </div>

</body>
</html>
