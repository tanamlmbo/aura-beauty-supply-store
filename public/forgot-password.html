<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Beauty // Reset Access</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="96x96" href="/my_favicon.png">
</head>
<body class="auth-page-body">

    <header class="category-header">
        <a href="/login" class="back-home-link">&larr; Return to Client Portal</a>
        <h1 class="collection-title">CREDENTIAL RECOVERY</h1>
        <div style="width: 100px;"></div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Reset Your Password</h2>
            <p class="auth-subtitle">Verify your account email and specify your updated luxury access string.</p>

            <div id="error-alert-box" class="brand-alert-banner" style="display: none;"></div>

            <form action="/forgot-password" method="POST" class="secure-auth-form">
                <div class="input-group">
                    <label for="reset-email">Account Email</label>
                    <input type="email" id="reset-email" name="email" placeholder="name@domain.com" required>
                </div>

                <div class="input-group">
                    <label for="reset-password">New Secure Password</label>
                    <input type="password" id="reset-password" name="password" placeholder="Min. 8 chars, 1 Cap, 1 Special" required>
                </div>

                <button type="submit" class="auth-submit-btn">COMMIT NEW CREDENTIALS</button>
            </form>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const alertBox = document.getElementById('error-alert-box');
            alertBox.textContent = error;
            alertBox.style.display = 'block';
        }
    </script>
</body>
</html>
